  <circle cx="1400" cy="80" r="260" fill="none" stroke="#0a0a0a" stroke-opacity="0.08"/>
  <circle cx="1400" cy="80" r="180" fill="none" stroke="#0a0a0a" stroke-opacity="0.10"/>
